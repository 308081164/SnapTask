name: Release SnapTask

on:
  push:
    tags:
      - 'v*'

env:
  VITE_AI_API_KEY: ${{ secrets.VITE_AI_API_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and release Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SnapTask ${{ github.ref_name }}'
          releaseBody: |
            ## SnapTask ${{ github.ref_name }}

            ### Changes
            - See commit history for detailed changes

            ### Installation
            - **macOS**: Download the `.dmg` file and drag to Applications
            - **Windows**: Download the `.exe` (NSIS installer) or `.msi` file
            - **Linux**: Download the `.deb` or `.AppImage` file

            ### System Requirements
            - macOS 12+ (Apple Silicon & Intel)
            - Windows 10/11
            - Ubuntu 22.04+ / Fedora 36+ / Debian 12+

            ---
            *SnapTask - Screenshot to Task with AI*
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
